name: CI/CD Build & Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version Number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
  
jobs:

# ==========================================
# 1. CI JOB: Test and Validate Build
# ==========================================
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        configuration: [Debug, Release]
        # os: [ubuntu-latest, windows-latest, macos-latest]
        os: [windows-latest]

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Install .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build Solution (Debug)
      run: dotnet build --configuration Debug --no-restore

    # Execute all unit tests in the solution
    - name: Execute unit tests
      run: dotnet test
        
# ==========================================
# 2. CD JOB: Package & Create Release Assets
# ==========================================

  publish-release:
    name: Package and Release
    needs: build-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            output_name: ProceduralSFXCompanion-v${{ github.event.inputs.version }}-Windows-x64
          # - os: ubuntu-latest
          #   rid: linux-x64
          #   output_name: ProceduralSFXCompanion-v${{ github.event.inputs.version }}-Linux-x64
          # - os: macos-latest
          #   rid: osx-x64
          #   output_name: ProceduralSFXCompanion-v${{ github.event.inputs.version }

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v5

    - name: Install .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Publish Portable Binary
      # Publishes a Trimmed, Single-File production executable optimized for distribution
      shell: bash
      run: dotnet publish -c Release -r ${{ matrix.rid }} --self-contained false -p:PublishSingleFile=true -p:PublishTrimmed=false -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

    - name: Rename and Package Executable
      shell: bash
      run: |
        New-Item -ItemType Directory -Force -Path ./release_artifact
        
        # Move and rename the executable
        Move-Item -Path ./publish/ProceduralSFXCompanion.exe -Destination ./release_artifact/${{ matrix.output_name }}.exe
        
        # Native PowerShell compression (creates the zip file seamlessly)
        Compress-Archive -Path ./release_artifact/${{ matrix.output_name }}.exe -DestinationPath ./${{ matrix.output_name }}.zip

    - name: Upload Artifacts to Pipeline
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.output_name }}
        path: |
          *.zip
          *.tar.gz    

# ==========================================
# 3. RELEASE JOB: Consolidate & Draft Draft Release
# ==========================================
  create-release:
    name: Create GitHub Release
    needs: publish-release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial permission for creating releases
    
    steps:
    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: ProceduralSFXCompanion-Windows-x64
        path: ./artifacts

    # - name: Download Linux Artifact
    #   uses: actions/download-artifact@v4
    #   with:
    #     name: ProceduralSFXCompanion-v${{ github.event.inputs.version }}-Linux-x64
    #     path: ./artifacts

    # - name: Download macOS Artifact
    #   uses: actions/download-artifact@v4
    #   with:
    #     name: ProceduralSFXCompanion-v${{ github.event.inputs.version }}-macOS-x64
    #     path: ./artifacts

    - name: Create GitHub Release Draft
      uses: softprops/action-gh-release@v2
      with:
        files: ./artifacts/*
        draft: true # Creates it as a draft so you can polish release notes before publicizing
        prerelease: false
        generate_release_notes: true # Auto-populates release details from commit history
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
